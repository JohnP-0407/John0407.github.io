<!DOCTYPE html>
<html>
<head>
<title>Rudraksha Mala Store</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#8B4513;
color:white;
padding:20px;
text-align:center;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.product{
background:white;
border:1px solid #ccc;
width:220px;
margin:15px;
padding:15px;
text-align:center;
border-radius:10px;
}

button{
background:#8B4513;
color:white;
padding:10px;
border:none;
cursor:pointer;
}

#cart{
position:fixed;
right:20px;
top:20px;
background:white;
padding:10px;
border:1px solid #ccc;
}

</style>

</head>

<body>

<header>
<h1>Rudraksha Mala Store</h1>
<p>Original Spiritual Rudraksha</p>
</header>

<div id="cart">
Cart Items: <span id="count">0</span>
</div>

<div class="container">

<div class="product">
<h3>5 Mukhi Rudraksha</h3>
<p>Price ₹299</p>
<button onclick="add()">Add to Cart</button>
</div>

<div class="product">
<h3>7 Mukhi Rudraksha</h3>
<p>Price ₹499</p>
<button onclick="add()">Add to Cart</button>
</div>

<div class="product">
<h3>9 Mukhi Rudraksha</h3>
<p>Price ₹699</p>
<button onclick="add()">Add to Cart</button>
</div>

<div class="product">
<h3>11 Mukhi Rudraksha</h3>
<p>Price ₹999</p>
<button onclick="add()">Add to Cart</button>
</div>

</div>

<center>
<br>
<a href="https://wa.me/9219187090">
<button>Order on WhatsApp</button>
</a>
</center>

<script>

let count=0;

function add(){
count++;
document.getElementById("count").innerText=count;
}

</script>

</body>
</html>
